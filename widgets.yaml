- greeting:
    text_size: xl
    text: Welcome to unRAID

- datetime:
    text_size: xl
    format:
      dateStyle: long
      timeStyle: short
      hourCycle: h12

- search:
    provider: google
    target: _blank

- resources:
    cpu: true
    memory: true
    cputemp: true
    uptime: true
    refresh: 3000

- resources:
    label: Root
    disk: /
    refresh: 3000

- datetime:
    label: AKL
    text_size: xl
    locale: en-NZ
    format:
      timeZone: Pacific/Auckland
      timeStyle: short
      hourCycle: h23
- datetime:
    label: TOR
    text_size: xl
    locale: en-CA
    format:
      timeZone: America/Toronto
      timeStyle: short
      hourCycle: h23
- datetime:
    label: SYD
    text_size: xl
    locale: en-AU
    format:
      timeZone: Australia/Sydney
      timeStyle: short
      hourCycle: h23
- datetime:
    label: UTC
    text_size: xl
    format:
      timeZone: UTC
      timeStyle: short
      hourCycle: h23
